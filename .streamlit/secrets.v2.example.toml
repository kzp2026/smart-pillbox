# V2 单用户登录。密码必须保存为 scrypt 哈希，不要填写明文。
V2_USERNAME = "owner"
V2_PASSWORD_HASH = "scrypt$16384$8$1$<salt-hex>$<digest-hex>"

# V2 独立 PostgreSQL schema。可使用同一 Supabase 项目，但不要复用 public 表。
V2_DATABASE_URL = "postgresql://postgres.<project-ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres"
V2_SCHEMA = "agent_v2"
V2_OWNER_ID = "private-owner"

# 可选：私有 Supabase Storage；桶必须设为 Private。
# 未配置时，V2 会把二进制归档持久化在 agent_v2.artifact_blobs，仍不会使用公共目录。
V2_STORAGE_URL = "https://<project-ref>.supabase.co/storage/v1"
V2_STORAGE_SERVICE_KEY = "<service-role-key>"
V2_STORAGE_BUCKET = "agent-v2-private"

# 原站只读迁移源。迁移按钮不会修改这里的数据。
V2_LEGACY_DATABASE_URL = "postgresql://<legacy-connection>"
V2_LEGACY_OUTPUT_ROOTS = "output;output/knowledge_runs"

# 文本模型；未配置密钥时会明确标记为离线规则回退。
V2_DEEPSEEK_API_KEY = "<deepseek-key>"
V2_DEEPSEEK_MODEL = "deepseek-chat"
V2_DEEPSEEK_BASE_URL = "https://api.deepseek.com"

# 图片模型。付费生成前，页面会再次显示供应商、模型和数量并要求确认。
V2_IMAGE_PROVIDER = "dashscope"
V2_IMAGE_MODEL = "wan2.7-image-pro"
V2_IMAGE_API_KEY = "<dashscope-key>"
V2_IMAGE_BASE_URL = ""
